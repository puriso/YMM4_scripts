name: Basic checks

on:
  pull_request:
    paths:
      - "scripts/**/*.py"
  push:
    branches:
      - main
    paths:
      - "scripts/**/*.py"

permissions:
  contents: read
  pull-requests: write

jobs:
  python:
    name: Python syntax and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: python -m pip install ruff

      - name: Compile Python files under scripts
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' files < <(find scripts -name '*.py' -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files found under scripts/."
            exit 1
          fi

          python3 -m py_compile "${files[@]}"

      - name: Run ruff
        id: ruff
        shell: bash
        run: |
          set +e

          ruff check scripts --output-format=github
          status=$?
          ruff check scripts > "$RUNNER_TEMP/ruff-output.txt" 2>&1

          {
            echo "### Python lint"
            echo
            if [ "$status" -eq 0 ]; then
              echo "Ruff passed."
            else
              echo "Ruff failed."
              echo
              echo '```text'
              cat "$RUNNER_TEMP/ruff-output.txt"
              echo '```'
            fi
          } > "$RUNNER_TEMP/ruff-pr-comment.md"

          cat "$RUNNER_TEMP/ruff-pr-comment.md" >> "$GITHUB_STEP_SUMMARY"

          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Comment lint result on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        continue-on-error: true
        with:
          header: python-lint
          path: ${{ runner.temp }}/ruff-pr-comment.md
